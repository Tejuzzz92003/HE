<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Enquiry Form</title>

<!-- jsPDF CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family:Segoe UI,Arial;
  background:#f4f6f8;
  padding:20px;
}
.form-wrap{
  max-width:900px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:8px;
  box-shadow:0 8px 25px rgba(0,0,0,.08);
}
h1{
text-align:center
}
.section{
  border:1px solid #ccc;
  padding:12px;
  margin-bottom:12px;
  border-radius:6px;
}
.row{
  display:flex;
  gap:10px;
  margin-bottom:8px;
}
label{
min-width:150px;
font-weight:600}
input,textarea{
flex:1;
padding:6px;
}
.actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
}
button{
  padding:10px 16px;
  font-weight:600;
  cursor:pointer;
}
.whatsapp{
background:#25D366;
color:#fff;
border:none
}
.pdf{
background:#0b5ed7;
color:#fff;
border:none
}

/* 📱 MOBILE RESPONSIVE */
/* ===================== */
@media (max-width: 768px){

  body{
    padding:10px;
  }

  .form-wrap{
    padding:15px;
  }

  /* Stack rows */
  .row{
    flex-direction:column;
    align-items:flex-start;
  }

  label{
    min-width:auto;
    margin-bottom:4px;
  }

  input, textarea{
    width:100%;
  }

  /* Checkbox grid wrap */
  .source-grid,
  .inline-options{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
  }

  /* Buttons full width */
  .actions{
    flex-direction:column;
  }

  .actions button{
    width:100%;
  }
}
</style>
</head>

<body>
<div class="form-wrap">

<h1>Enquiry Form</h1>

<div class="row">
  <label>Form No</label>
  <input id="formNo">
  <label>Date</label>
  <input id="date" type="date">
</div>

<div class="section">
<h3>PERSONAL INFO</h3>
<div class="row"><label>Name *</label><input id="name"></div>
<div class="row"><label>Age</label><input id="age"></div>
<div class="row"><label>Phone *</label><input id="phone"></div>
<div class="row"><label>Email</label><input id="email"></div>
<div class="row"><label>Address</label><input id="address"></div>
<h3>FINANCIAL INFO</h3>
<div class="row"><label>Interested In</label>
<input type="checkbox" value="1 BHK" name="int">1 BHK
<input type="checkbox" value="2 BHK" name="int">2 BHK
<input type="checkbox" value="Penthouse" name="int">Penthouse
</div>

<div class="row"><label>Budget</label>
<input type="checkbox" value="30-35" name="bud">30-35
<input type="checkbox" value="36-40" name="bud">36-40
<input type="checkbox" value="41-45" name="bud">41-45
</div>
</div>

      
    </section>

    <!-- Source of Information -->
    <section class="section" aria-labelledby="source-info">
      <h2 id="source-info">SOURCE OF INFORMATION</h2>

      <div class="source-grid" style="margin-bottom:10px;">
        <label class="checkbox-inline"><input type="checkbox" name="source" value="Hoardings"/> Hoardings</label>
        <label class="checkbox-inline"><input type="checkbox" name="source" value="Friends"/> Friends</label>
        <label class="checkbox-inline"><input type="checkbox" name="source" value="Digital Ads"/> Digital Ads</label>
        <label class="checkbox-inline"><input type="checkbox" name="source" value="Existing Customer"/> Existing Customer</label>
        <label class="checkbox-inline"><input type="checkbox" name="source" value="Train"/> Train</label>
        <label class="checkbox-inline"><input type="checkbox" name="source" value="Online Portal"/> Online Portal</label>
        <label class="checkbox-inline"><input type="checkbox" name="source" value="Walking's"/> Walking's</label>
        <label class="checkbox-inline"><input type="checkbox" name="source" value="Pre-Sales"/> Pre-Sales</label>
        <label class="checkbox-inline"><input type="checkbox" name="source" value="Vehicle Branding"/> Vehicle Branding</label>
      </div>
    </section>


<div class="section">
<h3>REMARK</h3>
<textarea id="remark"></textarea>
</div>

<div class="actions">
<button class="pdf" onclick="generatePDF()">Generate PDF</button>
<button class="whatsapp" onclick="sendWhatsApp()">Send WhatsApp</button>
</div>

</div>



  <script>
const q = s => [...document.querySelectorAll(s)];

function collect(){
  return {
    formNo: document.getElementById('formNo').value || '-',
    date: document.getElementById('date').value || '-',
    name: document.getElementById('name').value.trim() || '-',
    age: document.getElementById('age').value || '-',
    phone: document.getElementById('phone').value.trim() || '-',
    email: document.getElementById('email').value || '-',
    address: document.getElementById('address').value || '-',
    interest: q('input[name=int]:checked').map(i=>i.value).join(', ') || '-',
    budget: q('input[name=bud]:checked').map(i=>i.value).join(', ') || '-',
    remark: document.getElementById('remark').value || '-'
  }
}



/* ---------------- WHATSAPP ---------------- */
function sendWhatsApp(){
  const d = collect();
  if(d.name==='-' || d.phone==='-'){
    alert("Name & Phone required");
    return;
  }

  const msg = `
📋 *Enquiry Form*
Form No: ${d.formNo}
Date: ${d.date}

*Name:* ${d.name}
*Age:* ${d.age}
*Phone:* ${d.phone}
*Email:* ${d.email}
*Address:* ${d.address}

*Interested:* ${d.interest}
*Budget:* ${d.budget}

*Remark:* ${d.remark}
`;

  const phoneNo = "919320658734";
  window.open(`https://wa.me/${phoneNo}?text=${encodeURIComponent(msg)}`,'_blank');
}

/* ---------------- PDF ---------------- */
function generatePDF(){
  const d = collect();
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  let y = 15;
  pdf.setFontSize(14);
  pdf.text("ENQUIRY FORM", 80, y);
  y+=10;

  pdf.setFontSize(10);
  for(const [k,v] of Object.entries(d)){
    pdf.text(`${k.toUpperCase()} : ${v}`, 10, y);
    y+=8;
  }

  pdf.save(`Enquiry_${d.name}.pdf`);
}

/* today date */
date.value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
